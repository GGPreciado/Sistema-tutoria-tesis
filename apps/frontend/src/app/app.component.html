<div class="app-layout">

  <header class="app-header">
    <div class="header-contenido">
      <span class="logo">Sistema de Tutoría</span>

      <nav class="header-nav" aria-label="Navegación principal">
        @if (auth.usuarioActual()) {
          <a class="header-usuario" routerLink="/profile" aria-label="Ver perfil">
            {{ auth.usuarioActual()!.nombre }}
          </a>
          <button class="btn-logout" (click)="cerrarSesion()">Cerrar sesión</button>
        }
      </nav>
    </div>
  </header>

  <main class="app-main">
    <router-outlet />
  </main>

  <!-- Slot reservado para el chatbot flotante (Fase 2 — Sprint 3) -->
  <div id="chatbot-slot" aria-hidden="true"></div>

</div>
