<div class="login-contenedor">
  <div class="login-tarjeta">

    <div class="login-logo">
      <span class="logo-icono">🎓</span>
      <h1 class="logo-titulo">Sistema de Tutoría</h1>
    </div>

    <form class="login-formulario" [formGroup]="formulario" (ngSubmit)="ingresar()">

      <div class="campo">
        <label for="codigo" class="campo-etiqueta">Nombre de usuario</label>
        <input
          id="codigo"
          type="text"
          formControlName="codigo"
          autocomplete="username"
          [class.campo-invalido]="camposCodigo.touched && camposCodigo.invalid"
        />
        @if (camposCodigo.touched && camposCodigo.hasError('required')) {
          <span class="campo-error" role="alert">Ingresa tu nombre de usuario</span>
        }
      </div>

      <div class="campo">
        <label for="password" class="campo-etiqueta">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [class.campo-invalido]="camposPassword.touched && camposPassword.invalid"
        />
        @if (camposPassword.touched && camposPassword.hasError('required')) {
          <span class="campo-error" role="alert">Ingresa tu contraseña</span>
        }
      </div>

      @if (errorMensaje()) {
        <div class="error-global" role="alert">
          ⚠️ {{ errorMensaje() }}
        </div>
      }

      <button type="submit" class="btn-ingresar" [disabled]="cargando()">
        @if (cargando()) {
          Ingresando…
        } @else {
          Ingresar
        }
      </button>

    </form>
  </div>
</div>
